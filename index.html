<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diversify Now</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #1a2526; /* Warna latar belakang gelap */
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Navbar */
        nav {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: center; /* Pusatkan menu */
            align-items: center;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            opacity: 0.8;
        }

        nav ul li a:hover {
            opacity: 1;
        }

        .theme-icon {
            position: absolute; /* Pisahkan ikon dari tata letak menu */
            right: 40px;
            top: 20px;
            font-size: 20px;
            cursor: pointer;
        }

        /* Konten Utama */
        .content {
            text-align: center;
        }

        .content h1 {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .content p {
            font-size: 20px;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        /* Tombol */
        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .buttons button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .buttons button:first-child {
            background-color: white;
            color: #1a2526;
        }

        .buttons button:first-child:hover {
            background-color: #e0e0e0;
        }

        .buttons button:last-child {
            background-color: #2a3b3c;
            color: white;
        }

        .buttons button:last-child:hover {
            background-color: #3a4b4c;
        }

        /* Tautan Learn More */
        .learn-more {
            color: white;
            text-decoration: none;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 5px;
            opacity: 0.8;
            justify-content: center;
        }

        .learn-more:hover {
            opacity: 1;
        }

        .learn-more::after {
            content: '→';
            font-size: 18px;
        }

        /* Responsivitas */
        @media (max-width: 768px) {
            .content h1 {
                font-size: 40px;
            }
            .content p {
                font-size: 16px;
            }
            .buttons {
                flex-direction: column;
                gap: 10px;
            }
            nav ul {
                gap: 10px;
            }
            nav ul li a {
                font-size: 14px;
            }
            .theme-icon {
                right: 20px;
                top: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Dashboard</a></li>
            <li><a href="#">Methodology</a></li>
            <li><a href="#">Contribute</a></li>
        </ul>
        <div class="theme-icon">☀️</div>
    </nav>

    <!-- Konten Utama -->
    <div class="content">
        <h1>Diversify Now Sigma Grok</h1>
        <p>Improve Sigma Grok resilience by using a minority client</p>
        <div class="buttons">
            <button>Switch Clients</button>
            <button>Dashboard</button>
        </div>
        <a href="#" class="learn-more">Learn More</a>
    </div>
</body>
</html>
