<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple API Tester - Sigma Grok</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
            text-align: center;
        }

        input {
            width: 70%;
            padding: 8px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        button {
            padding: 8px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        #result {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            min-height: 50px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Simple API Tester</h1>
        <input type="text" id="apiInput" placeholder="Masukkan data untuk API">
        <button onclick="sendRequest()">Kirim</button>
        <div id="result">Hasil akan muncul di sini</div>
    </div>

    <script>
        async function sendRequest() {
            const input = document.getElementById('apiInput').value;
            const resultDiv = document.getElementById('result');
            
            // API Key (Catatan: Tidak aman menyimpan di sini, ini hanya untuk demo)
            const apiKey = "F9pJe0lFkaKjkcMRnXn03n84UCk46jYI";

            // Endpoint API xAI (ganti dengan endpoint yang benar dari dokumentasi xAI)
            const apiUrl = "https://api.x.ai/v1/chat/completions"; // Contoh endpoint, sesuaikan dengan yang benar

            try {
                resultDiv.innerHTML = "Mengirim request...";
                
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "grok", // Model yang digunakan, misalnya "grok"
                        messages: [
                            {
                                role: "user",
                                content: input
                            }
                        ],
                        max_tokens: 100 // Batasi panjang respons
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Tampilkan hasil dari API (misalnya, respons teks dari Grok)
                    const result = data.choices[0].message.content;
                    resultDiv.innerHTML = result;
                } else {
                    resultDiv.innerHTML = `Error: ${data.error.message || 'Terjadi kesalahan'}`;
                }
            } catch (error) {
                resultDiv.innerHTML = `Error: ${error.message}`;
            }
        }
    </script>
</body>
</html>
