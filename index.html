<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dividend Income Display</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Menggunakan min-height agar konten panjang tetap terlihat */
            margin: 0;
            background-color: #f0f0f0;
        }
        .dividend-box {
            background-color: #2e5e4e; /* Warna hijau tua */
            color: white;
            padding: 25px; /* Sedikit lebih besar untuk ruang */
            border-radius: 10px;
            text-align: left;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            width: 300px;
            max-width: 90%; /* Membatasi lebar pada layar kecil */
            box-sizing: border-box; /* Memastikan padding tidak menambah lebar */
        }
        .dividend-box h1 {
            font-size: 24px;
            margin: 0 0 10px; /* Memberi jarak bawah */
        }
        .dividend-box h2 {
            font-size: 32px; /* Sedikit dikecilkan agar proporsional */
            margin: 10px 0;
            font-weight: normal; /* Mengurangi ketebalan default */
        }
        .dividend-box p {
            font-size: 18px;
            margin: 8px 0; /* Jarak antar paragraf lebih seragam */
            display: flex;
            justify-content: space-between; /* Menggantikan float untuk layout lebih baik */
            align-items: center;
        }
        .dividend-box p strong {
            font-size: 24px; /* Membuat angka utama lebih menonjol */
        }
        .dividend-box p span {
            font-weight: bold; /* Membuat angka di sebelah kanan lebih tebal */
        }
    </style>
</head>
<body>
    <div class="dividend-box">
        <h1>Sigma Grok</h1>
        <h2>Annual Dividend Income</h2>
        <p><strong>$2,148.90</strong></p>
        <p>Monthly <span>$179.08</span></p>
        <p>Daily <span>$5.89</span></p>
        <p>Yield <span>79.74%</span></p>
        <p>Yield on Cost <span>82.53%</span></p>
    </div>
</body>
</html>
