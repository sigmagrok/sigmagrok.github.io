<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kata Bijak</title>
    <style>
        body {
            font-family: 'Georgia', serif; /* Font elegan untuk kesan bijaksana */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #4a2c6d, #1e90ff); /* Latar gradien */
        }
        .quote-container {
            background-color: rgba(240, 200, 100, 0.9); /* Emas Lembut */
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            text-align: center;
            position: relative;
        }
        .quote-container::before {
            content: '“'; /* Tanda kutip besar di awal */
            font-size: 50px;
            color: #4a2c6d;
            position: absolute;
            top: -20px;
            left: 20px;
        }
        .quote-container::after {
            content: '”'; /* Tanda kutip besar di akhir */
            font-size: 50px;
            color: #4a2c6d;
            position: absolute;
            bottom: -20px;
            right: 20px;
        }
        .quote {
            font-size: 24px;
            color: #333;
            margin: 20px 0;
            line-height: 1.4;
        }
        .author {
            font-size: 18px;
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="quote-container">
        <p class="quote">Hidup adalah misteri yang harus dijalani, bukan masalah yang harus diselesaikan.</p>
        <p class="author">— Jalaluddin Rumi</p>
    </div>
</body>
</html>
