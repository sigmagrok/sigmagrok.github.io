<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dividend Income Display</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .dividend-box {
            background-color: #2e5e4e; /* Warna hijau tua seperti di gambar */
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .dividend-box h1 {
            font-size: 24px;
            margin: 0;
        }
        .dividend-box h2 {
            font-size: 36px;
            margin: 10px 0;
        }
        .dividend-box p {
            font-size: 18px;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="dividend-box">
        <h1>Sigma Grok</h1>
        <h1>Annual Dividend Income</h1>
        <h2>$2,148.90</h2>
        <p>Monthly <span style="float: right;">$179.08</span></p>
        <p>Daily <span style="float: right;">$5.89</span></p>
        <p>Yield <span style="float: right;">79.74%</span></p>
        <p>Yield on Cost <span style="float: right;">82.53%</span></p>
    </div>
</body>
</html>
