<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Responsif - Galeri Foto</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-item {
            position: relative; /* Untuk teks di atas gambar jika diperlukan */
            height: 200px; /* Tinggi tetap untuk konsistensi */
            overflow: hidden; /* Menghindari gambar meluber */
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .gallery-item img {
            width: 100%; /* Gambar memenuhi lebar container */
            height: 100%; /* Gambar memenuhi tinggi container */
            object-fit: cover; /* Memastikan gambar terpotong rapi */
            display: block; /* Menghilangkan whitespace bawah */
        }

        .gallery-item span {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 5px 10px;
            border-radius: 3px;
            font-size: 14px;
        }

        /* Media query untuk layar sangat kecil */
        @media (max-width: 400px) {
            .gallery {
                grid-template-columns: 1fr; /* Satu kolom penuh */
            }
        }
    </style>
</head>
<body>
    <div class="gallery">
        <div class="gallery-item">
            <img src="https://primal.net/e/nevent1qqsgdc57xudl9hn3hzjlv4qdjemhkktp0tmzq0fpw8w3h32xtaprf6qkkg98n" alt="Foto 1">
            <span>Foto 1</span>
        </div>
        <div class="gallery-item">
            <img src="https://via.placeholder.com/300x200" alt="Foto 2">
            <span>Foto 2</span>
        </div>
        <div class="gallery-item">
            <img src="https://via.placeholder.com/300x200" alt="Foto 3">
            <span>Foto 3</span>
        </div>
        <div class="gallery-item">
            <img src="https://via.placeholder.com/300x200" alt="Foto 4">
            <span>Foto 4</span>
        </div>
        <div class="gallery-item">
            <img src="https://via.placeholder.com/300x200" alt="Foto 5">
            <span>Foto 5</span>
        </div>
        <div class="gallery-item">
            <img src="https://via.placeholder.com/300x200" alt="Foto 6">
            <span>Foto 6</span>
        </div>
    </div>
</body>
</html>
