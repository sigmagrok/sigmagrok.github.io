<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Responsif - Galeri Foto</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-item {
            background-color: #4a90e2;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 18px;
            border-radius: 8px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Media query untuk layar sangat kecil */
        @media (max-width: 400px) {
            .gallery {
                grid-template-columns: 1fr; /* Satu kolom penuh */
            }
        }
    </style>
</head>
<body>
    <div class="gallery">
        <div class="gallery-item">Foto 1</div>
        <div class="gallery-item">Foto 2</div>
        <div class="gallery-item">Foto 3</div>
        <div class="gallery-item">Foto 4</div>
        <div class="gallery-item">Foto 5</div>
        <div class="gallery-item">Foto 6</div>
    </div>
</body>
</html>
