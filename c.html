<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Responsif - Gambar dan Video</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-item {
            position: relative;
            height: 200px; /* Tinggi tetap untuk konsistensi */
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .gallery-item img,
        .gallery-item video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Memotong rapi untuk gambar dan video */
            display: block;
        }

        .gallery-item span {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 5px 10px;
            border-radius: 3px;
            font-size: 14px;
        }

        /* Kontrol video */
        .gallery-item video {
            outline: none; /* Hapus outline default */
        }

        /* Media query untuk layar sangat kecil */
        @media (max-width: 400px) {
            .gallery {
                grid-template-columns: 1fr; /* Satu kolom penuh */
            }
        }
    </style>
</head>
<body>
    <div class="gallery">
        <div class="gallery-item">
            <img src="https://primal.b-cdn.net/media-cache?s=o&a=1&u=https%3A%2F%2Fm.primal.net%2FPWxY.jpg" alt="Gambar 1">
            <span>Gambar 1</span>
        </div>
        <div class="gallery-item">
            <video controls>
                <source src="https://primal.b-cdn.net/media-upload?u=https%3A%2F%2Fmedia.primal.net%2Fuploads%2Fa%2Fc3%2F74%2Fac3747621491d5f42f15143843f4635341597e69476a137863db9d4bd3995d00.mp4" type="video/mp4">
                Browser Anda tidak mendukung video.
            </video>
            <span>Video 1</span>
        </div>
        <div class="gallery-item">
            <img src="https://via.placeholder.com/300x200" alt="Gambar 2">
            <span>Gambar 2</span>
        </div>
        <div class="gallery-item">
            <video controls>
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                Browser Anda tidak mendukung video.
            </video>
            <span>Video 2</span>
        </div>
        <div class="gallery-item">
            <img src="https://via.placeholder.com/300x200" alt="Gambar 3">
            <span>Gambar 3</span>
        </div>
        <div class="gallery-item">
            <img src="https://via.placeholder.com/300x200" alt="Gambar 4">
            <span>Gambar 4</span>
        </div>
    </div>
</body>
</html>
