<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contoh CSS Grid</title>
    <style>
        /* Reset default margin dan padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
            color: #333;
        }

        /* Grid Container */
        .grid-container {
            display: grid;
            grid-template-columns: 250px 1fr; /* Sidebar 250px, sisanya fleksibel */
            grid-template-rows: auto 1fr auto; /* Header dan footer auto, main fleksibel */
            grid-template-areas:
                "header header"
                "sidebar main"
                "footer footer";
            gap: 15px; /* Jarak antar elemen */
            min-height: 100vh; /* Tinggi penuh layar */
            padding: 20px; /* Jarak dari tepi */
        }

        /* Styling untuk masing-masing area */
        .header {
            grid-area: header;
            background-color: #4a90e2;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
        }

        .sidebar {
            grid-area: sidebar;
            background-color: #50c878;
            padding: 20px;
            color: white;
        }

        .main {
            grid-area: main;
            background-color: #ffffff;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .footer {
            grid-area: footer;
            background-color: #333;
            color: white;
            padding: 20px;
            text-align: center;
        }

        /* Responsif: Ubah layout jadi satu kolom di layar kecil */
        @media (max-width: 768px) {
            .grid-container {
                grid-template-columns: 1fr; /* Satu kolom */
                grid-template-areas:
                    "header"
                    "sidebar"
                    "main"
                    "footer";
            }
        }
    </style>
</head>
<body>
    <div class="grid-container">
        <header class="header">Header</header>
        <aside class="sidebar">Sidebar</aside>
        <main class="main">Konten Utama</main>
        <footer class="footer">Footer</footer>
    </div>
</body>
</html>
