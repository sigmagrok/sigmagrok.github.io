<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trend Sigma Grok</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background-color: #1a2526;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 {
            margin-bottom: 20px;
        }
        .button-group {
            text-align: center;
            margin-bottom: 20px;
        }
        .button-group button {
            background-color: #2a3b3c;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border-radius: 5px;
        }
        .button-group button:hover {
            background-color: #3a4b4c;
        }
        .button-group button.active {
            background-color: #4a5b5c;
        }
        .chart-container {
            width: 90vw; /* Lebar 90% dari viewport */
            max-width: 800px; /* Maksimum lebar 800px */
            height: 600px; /* Tinggi grafik diperbesar */
            margin: 0 auto;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
            background-color: #1a2526;
        }
    </style>
</head>
<body>
    <h1>Simulasi Trend Over Years</h1>
    <div class="button-group">
        <button onclick="updateChart('date')" class="active">Date</button>
        <button onclick="updateChart('entity')">Entity</button>
        <button onclick="updateChart('network')">Network</button>
    </div>
    <div class="chart-container">
        <canvas id="myChart"></canvas>
    </div>

    <script>
        const years = [2024, 2025, 2026, 2027, 2028, 2029, 2030, 2031, 2032];
        const dataSets = {
            date: [0, 0, 0, 0, 10, 50, 100, 150, 150],
            entity: [5, 10, 15, 20, 30, 40, 60, 80, 100],
            network: [10, 20, 30, 40, 50, 70, 90, 110, 130]
        };

        const ctx = document.getElementById('myChart').getContext('2d');
        let chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: years,
                datasets: [{
                    label: 'Value',
                    data: dataSets.date,
                    borderColor: 'white',
                    backgroundColor: 'rgba(255, 255, 255, 0.2)',
                    fill: false,
                    tension: 0.1,
                    pointRadius: 5,
                    pointBackgroundColor: 'white'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false, // Memungkinkan grafik mengikuti ukuran container
                scales: {
                    x: {
                        title: {
                            display: true,
                            text: 'Year',
                            color: 'white',
                            font: {
                                size: 16
                            }
                        },
                        ticks: {
                            color: 'white',
                            font: {
                                size: 14
                            }
                        },
                        grid: {
                            color: 'rgba(255, 255, 255, 0.1)'
                        }
                    },
                    y: {
                        title: {
                            display: true,
                            text: 'Value',
                            color: 'white',
                            font: {
                                size: 16
                            }
                        },
                        ticks: {
                            color: 'white',
                            font: {
                                size: 14
                            }
                        },
                        grid: {
                            color: 'rgba(255, 255, 255, 0.1)'
                        },
                        beginAtZero: true,
                        max: 150
                    }
                },
                plugins: {
                    legend: {
                        display: false
                    }
                }
            }
        });

        function updateChart(group) {
            chart.data.datasets[0].data = dataSets[group];
            chart.update();

            document.querySelectorAll('.button-group button').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`button[onclick="updateChart('${group}')"]`).classList.add('active');
        }
    </script>
</body>
</html>
