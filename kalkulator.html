<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Saldo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f0f2f5, #e0e4e8);
            color: #2c3e50;
        }

        .container {
            background: linear-gradient(145deg, #ffffff, #f9fbfd);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1), 0 6px 10px rgba(0, 0, 0, 0.05);
            width: 600px;
            max-width: 90%;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(46, 204, 113, 0.1) 0%, transparent 70%);
            animation: pulse 10s infinite;
            z-index: 0;
        }

        @keyframes pulse {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15), 0 8px 15px rgba(0, 0, 0, 0.1);
        }

        .container > * {
            position: relative;
            z-index: 1;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .label {
            font-weight: 600;
            color: #34495e;
            font-size: 18px;
            display: flex;
            align-items: center;
        }

        .label::before {
            content: '💰';
            margin-right: 8px;
            font-size: 16px;
        }

        .input-field {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            margin-left: 20px;
            font-size: 16px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            background-color: #fafafa;
        }

        .input-field:focus {
            border-color: #2ecc71;
            box-shadow: 0 0 8px rgba(46, 204, 113, 0.5);
            outline: none;
        }

        .input-field[readonly] {
            background-color: #f1f3f5;
            color: #7f8c8d;
            cursor: not-allowed;
        }

        .input-field:invalid {
            border-color: #e74c3c;
            box-shadow: 0 0 5px rgba(231, 76, 60, 0.5);
        }

        .won-button, .loss-button {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.3s ease, transform 0.2s ease;
            text-transform: uppercase;
            font-size: 16px;
            margin-left: 10px;
        }

        .loss-button {
            background-color: #e74c3c;
        }

        .loss-button:hover {
            background-color: #c0392b;
        }

        .won-button:hover, .loss-button:hover {
            transform: scale(1.05);
        }

        .won-button:active, .loss-button:active {
            transform: scale(0.95);
        }

        .reset-button {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.3s ease, transform 0.2s ease;
            font-size: 14px;
            margin-left: 10px;
        }

        .reset-button:hover {
            background-color: #c0392b;
            transform: scale(1.05);
        }

        .reset-button:active {
            transform: scale(0.95);
        }

        .result {
            color: #7f8c8d;
            font-size: 16px;
            text-align: center;
            margin-top: 20px;
            padding: 12px;
            background-color: #f9fbfd;
            border-radius: 5px;
            border-left: 4px solid #3498db;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .highlight {
            color: #e74c3c;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px;
                width: 85%;
            }
            .row {
                flex-direction: column;
                text-align: center;
            }
            .input-field {
                margin: 12px 0;
                width: 100%;
            }
            .won-button, .loss-button, .reset-button {
                width: 100%;
                margin-top: 10px;
            }
            .label {
                margin-bottom: 10px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px;
                width: 90%;
            }
            .row {
                flex-direction: column;
                text-align: center;
            }
            .input-field {
                margin: 10px 0;
                width: 100%;
            }
            .won-button, .loss-button, .reset-button {
                width: 100%;
            }
            .label {
                margin-bottom: 5px;
            }
            .label::before {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <span class="label">Saldo sebelumnya ($)</span>
            <input type="number" id="initialBalance" class="input-field" value="100" min="0" required aria-label="Saldo sebelumnya">
        </div>
        <div class="row">
            <span class="label">dan Anda</span>
            <button class="won-button" onclick="hitung('profit')">Profit</button>
            <button class="loss-button" onclick="hitung('loss')">Loss</button>
            <button class="reset-button" onclick="reset()">Reset</button>
        </div>
        <div class="row">
            <span class="label">$</span>
            <input type="number" id="amount" class="input-field" value="111" min="0" required aria-label="Jumlah profit atau loss">
            <span class="label">(%)</span>
            <input type="text" id="percentage" class="input-field" readonly aria-label="Persentase profit atau loss">
        </div>
        <div class="row">
            <span class="label">Saldo sekarang ($)</span>
            <input type="text" id="currentBalance" class="input-field" readonly aria-label="Saldo sekarang">
        </div>
        <div class="result">
            Anda sekarang bisa kehilangan <span class="highlight" id="lossPercentage"></span>%, sebelum kembali ke saldo awal Anda.
        </div>
    </div>

    <script>
        let currentBalance = 100; // Saldo awal default

        function hitung(type) {
            let saldoAwal = parseFloat(document.getElementById('initialBalance').value) || 0;
            let amount = parseFloat(document.getElementById('amount').value) || 0;

            if (saldoAwal < 0 || amount < 0) {
                alert('Nilai tidak boleh negatif!');
                return;
            }

            if (type === 'profit') {
                currentBalance += amount;
                let persentase = ((amount / saldoAwal) * 100).toFixed(2);
                document.getElementById('percentage').value = persentase + '%';
            } else if (type === 'loss') {
                if (amount > currentBalance) {
                    alert('Jumlah kerugian melebihi saldo saat ini!');
                    return;
                }
                currentBalance -= amount;
                let persentaseKerugian = ((amount / currentBalance) * 100).toFixed(2);
                document.getElementById('percentage').value = '-' + persentaseKerugian + '%';
            }

            document.getElementById('currentBalance').value = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'USD' }).format(currentBalance);
            let kerugianDapatDitanggung = ((currentBalance - saldoAwal) / currentBalance * 100).toFixed(2);
            document.getElementById('lossPercentage').textContent = Math.max(0, kerugianDapatDitanggung); // Pastikan tidak negatif
        }

        function reset() {
            currentBalance = 100;
            document.getElementById('initialBalance').value = 100;
            document.getElementById('amount').value = 111;
            document.getElementById('percentage').value = '';
            document.getElementById('currentBalance').value = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'USD' }).format(100);
            document.getElementById('lossPercentage').textContent = '';
            hitung('profit'); // Hitung ulang dengan nilai default
        }

        document.getElementById('initialBalance').addEventListener('input', () => {
            currentBalance = parseFloat(document.getElementById('initialBalance').value) || 0;
            hitung('profit');
        });
        document.getElementById('amount').addEventListener('input', () => hitung('profit'));
        window.addEventListener('load', reset);
    </script>
</body>
</html>
