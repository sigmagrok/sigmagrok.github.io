<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Saldo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f0f2f5, #e0e4e8);
            color: #2c3e50;
        }

        .container {
            background-color: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15), 0 6px 6px rgba(0, 0, 0, 0.1);
            width: 450px;
            max-width: 90%;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.2), 0 8px 8px rgba(0, 0, 0, 0.1);
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .label {
            font-weight: 600;
            color: #34495e;
            font-size: 16px;
        }

        .input-field {
            flex: 1;
            padding: 8px 12px;
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            margin-left: 15px;
            font-size: 14px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            background-color: #fafafa;
        }

        .input-field:focus {
            border-color: #2ecc71;
            box-shadow: 0 0 5px rgba(46, 204, 113, 0.5);
            outline: none;
        }

        .input-field[readonly] {
            background-color: #f1f3f5;
            color: #7f8c8d;
            cursor: not-allowed;
        }

        .won-button {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.3s ease, transform 0.2s ease;
            text-transform: uppercase;
        }

        .won-button:hover {
            background-color: #27ae60;
            transform: scale(1.05);
        }

        .won-button:active {
            transform: scale(0.95);
        }

        .result {
            color: #7f8c8d;
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
            padding: 10px;
            background-color: #f9fbfd;
            border-radius: 5px;
            border-left: 4px solid #3498db;
        }

        .highlight {
            color: #e74c3c;
            font-weight: 600;
        }

        @media (max-width: 480px) {
            .container {
                padding: 15px;
                width: 100%;
            }
            .row {
                flex-direction: column;
                text-align: center;
            }
            .input-field {
                margin: 10px 0;
                width: 100%;
            }
            .won-button {
                width: 100%;
            }
            .label {
                margin-bottom: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <span class="label">Saldo Anda sebelumnya (Rp)</span>
            <input type="number" id="initialBalance" class="input-field" value="100" min="0">
        </div>
        <div class="row">
            <span class="label">dan Anda</span>
            <button class="won-button" onclick="hitung()">menang</button>
        </div>
        <div class="row">
            <span class="label">Rp</span>
            <input type="number" id="wonAmount" class="input-field" value="111" min="0">
            <span class="label">yang berarti (%)</span>
            <input type="text" id="wonPercentage" class="input-field" readonly>
        </div>
        <div class="row">
            <span class="label">Saldo Anda sekarang (Rp)</span>
            <input type="text" id="currentBalance" class="input-field" readonly>
        </div>
        <div class="result">
            Anda sekarang bisa kehilangan <span class="highlight" id="lossPercentage"></span>%, sebelum kembali ke saldo awal Anda.
        </div>
    </div>

    <script>
        function hitung() {
            let saldoAwal = parseFloat(document.getElementById('initialBalance').value) || 0;
            let jumlahMenang = parseFloat(document.getElementById('wonAmount').value) || 0;

            let persentaseMenang = ((jumlahMenang / saldoAwal) * 100).toFixed(2);
            document.getElementById('wonPercentage').value = persentaseMenang + '%';

            let saldoSekarang = saldoAwal + jumlahMenang;
            document.getElementById('currentBalance').value = saldoSekarang.toFixed(2);

            let kerugianDapatDitanggung = ((jumlahMenang / saldoSekarang) * 100).toFixed(2);
            document.getElementById('lossPercentage').textContent = kerugianDapatDitanggung;
        }

        document.getElementById('initialBalance').addEventListener('input', hitung);
        document.getElementById('wonAmount').addEventListener('input', hitung);
    </script>
</body>
</html>
